[tools]
node = "24"

[settings]
env_shell_expand = true

[env]
PATH = "./node_modules/.bin:${PATH}"

[tasks.setup]
depends = ["setup:env"]
env = { _.file = ".env" }
run = """
pnpm install
docker compose down -v
docker compose up -d
atlas schema --env env apply --auto-approve
node db/seed.ts
"""

[tasks."setup:env"]
hide = true
run = """
test -f .env || cp .env.example .env
"""

[tasks.dev]
env = { _.file = ".env" }
run = """
node --watch src/presentation/server.ts
"""

[tasks.check]
depends = ["check:*"]

[tasks."check:type"]
run = """
tsgo
"""

[tasks."check:style"]
run = """
oxlint
"""

[tasks."check:format"]
run = """
oxfmt --check
"""

[tasks.build]
run = """
vite build
"""

[tasks.preview]
depends = ["build"]
env = { _.file = [".env", ".env.preview"] }
run = """
node --enable-source-maps dist/server.js
"""

[tasks.test]
depends = ["test:ut", "test:it", "test:e2e"]

[tasks."test:ut"]
env = { _.file = [".env", ".env.test"] }
run = """
vitest --project ut
"""

[tasks."test:it"]
depends = ["test:setup-db"]
env = { _.file = [".env", ".env.test"] }
run = """
vitest --project it
"""

[tasks."test:e2e"]
depends = ["test:setup-db"]
wait_for = ["test:it"]
env = { _.file = [".env", ".env.test"] }
run = """
vitest --project e2e
"""

[tasks."test:setup-db"]
env = { _.file = [".env", ".env.test"] }
run = """
docker compose up -d
atlas schema --env env clean --auto-approve
atlas schema --env env apply --auto-approve
"""

[tasks.migrate]
env = { _.file = ".env" }
run = """
atlas schema --env env
"""

[tasks.generate]
env = { _.file = ".env" }
run = """
kysely-codegen --config-file kysely-codegen.ts
"""

[tasks.seed]
env = { _.file = ".env" }
run = """
node db/seed.ts
"""

[tasks.codegen]
env = { _.file = ".env" }
run = """
node schemagen.ts
oxfmt schema.graphql
graphql-codegen-esm
"""
